services:
  - type: web
    name: triton-dashboard
    env: python
    buildCommand: pip install -r dashboard/requirements.txt
    startCommand: streamlit run dashboard/app.py --server.port $PORT --server.address 0.0.0.0 --server.headless true
    envVars:
      - key: GITHUB_TOKEN
        sync: false        # set manually in Render dashboard
      - key: GITHUB_REPO
        value: rithik279/forex_grid
      - key: GITHUB_BRANCH
        value: main
    autoDeploy: true
